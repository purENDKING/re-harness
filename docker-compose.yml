version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:///./data/re_harness.db
      LOG_LEVEL: INFO
      APP_ENV: dev
    volumes:
      - ./:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
